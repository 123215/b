name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00 检查一次
  workflow_dispatch:

jobs:
  SyncUpstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch Upstream
        run: git remote add upstream https://github.com/MetaCubeX/ClashMetaForAndroid.git && git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if git merge-base --is-ancestor $UPSTREAM HEAD; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "Already up to date, skipping."
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "New upstream commits found."
          fi

      - name: Merge and Push
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git merge upstream/main --no-edit -m "chore: sync upstream $(git rev-parse --short upstream/main)"
          git push origin main
